<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #525659;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
    }
    #loading {
      color: #ccc;
      font-family: sans-serif;
      font-size: 14px;
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
    }
    .page-wrap {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      background: #525659;
    }
    .pdf-page-canvas {
      display: block;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      background: #fff;
      max-width: 100%;
      max-height: 100vh;
    }
    #nav-bar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-family: sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
      z-index: 10;
    }
    #nav-bar.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="loading">טוען מסמך...</div>
  <div id="nav-bar"></div>

  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs';

    const params  = new URLSearchParams(location.search);
    const fileUrl = decodeURIComponent(params.get('file') || '');
    const loading = document.getElementById('loading');
    const navBar  = document.getElementById('nav-bar');

    let pdfDoc      = null;
    let currentPage = 1;
    let navTimer    = null;
    const canvases  = [];   // indexed by page-1

    function showNav(text) {
      navBar.textContent = text;
      navBar.classList.add('show');
      clearTimeout(navTimer);
      navTimer = setTimeout(() => navBar.classList.remove('show'), 2000);
    }

    async function renderPage(pageNum) {
      const page  = await pdfDoc.getPage(pageNum);
      const vp0   = page.getViewport({ scale: 1 });
      const dpr   = window.devicePixelRatio || 1;

      // Fit page within viewport, then multiply by dpr for crisp rendering
      const fitScale = Math.min(
        (window.innerWidth  - 8) / vp0.width,
        (window.innerHeight - 8) / vp0.height
      );
      const viewport = page.getViewport({ scale: fitScale * dpr });

      const wrap   = document.createElement('div');
      wrap.className = 'page-wrap';

      const canvas = document.createElement('canvas');
      canvas.className    = 'pdf-page-canvas';
      canvas.dataset.page = pageNum;
      // Physical pixels = viewport size; CSS pixels = divided by dpr
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width  = (viewport.width  / dpr) + 'px';
      canvas.style.height = (viewport.height / dpr) + 'px';

      wrap.appendChild(canvas);
      document.body.insertBefore(wrap, navBar);
      canvases[pageNum - 1] = wrap;

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    async function loadAllPages() {
      const total = pdfDoc.numPages;
      loading.textContent = `טוען ${total} עמודים...`;

      // Render pages sequentially
      for (let i = 1; i <= total; i++) {
        loading.textContent = `טוען עמוד ${i} / ${total}...`;
        await renderPage(i);
      }

      loading.style.display = 'none';
      window.parent.postMessage({ type: 'pdf-ready', total }, '*');
    }

    function gotoPage(n) {
      if (!pdfDoc) return;
      n = Math.max(1, Math.min(n, pdfDoc.numPages));
      currentPage = n;
      const canvas = canvases[n - 1];
      if (canvas) {
        canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      showNav(`עמוד ${n} / ${pdfDoc.numPages}`);
      window.parent.postMessage({ type: 'pdf-page', page: n, total: pdfDoc.numPages }, '*');
    }

    window.addEventListener('message', ({ data }) => {
      if (!data) return;
      if      (data.cmd === 'next') gotoPage(currentPage + 1);
      else if (data.cmd === 'prev') gotoPage(currentPage - 1);
      else if (data.cmd === 'goto') gotoPage(data.page);
    });

    if (fileUrl) {
      pdfjsLib.getDocument(fileUrl).promise
        .then(doc => { pdfDoc = doc; loadAllPages(); })
        .catch(() => { loading.textContent = '⚠ שגיאה בטעינת המסמך'; });
    }
  </script>
</body>
</html>
