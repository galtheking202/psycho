<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #525659;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 48px;
    }
    #loading {
      color: #ccc;
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 40px;
    }
    #pdf-canvas {
      display: block;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      background: #fff;
      max-width: 100%;
    }
    #nav-bar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-family: sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
    }
    #nav-bar.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="loading">טוען מסמך...</div>
  <canvas id="pdf-canvas" style="display:none"></canvas>
  <div id="nav-bar"></div>

  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs';

    const params  = new URLSearchParams(location.search);
    const fileUrl = decodeURIComponent(params.get('file') || '');
    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const navBar  = document.getElementById('nav-bar');

    let pdfDoc      = null;
    let currentPage = 1;
    let rendering   = false;
    let navTimer    = null;

    function showNav(text) {
      navBar.textContent = text;
      navBar.classList.add('show');
      clearTimeout(navTimer);
      navTimer = setTimeout(() => navBar.classList.remove('show'), 2000);
    }

    async function gotoPage(n) {
      if (!pdfDoc || rendering) return;
      n = Math.max(1, Math.min(n, pdfDoc.numPages));
      currentPage = n;
      rendering   = true;

      const page     = await pdfDoc.getPage(n);
      const scale    = Math.min((window.innerWidth - 16) / page.getViewport({ scale: 1 }).width, 2.5);
      const viewport = page.getViewport({ scale });

      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.display = 'block';
      loading.style.display = 'none';

      await page.render({ canvasContext: ctx, viewport }).promise;
      rendering = false;

      showNav(`עמוד ${n} / ${pdfDoc.numPages}`);

      // Notify parent of current page
      window.parent.postMessage({ type: 'pdf-page', page: n, total: pdfDoc.numPages }, '*');
    }

    window.addEventListener('message', ({ data }) => {
      if (!data) return;
      if (data.cmd === 'next') gotoPage(currentPage + 1);
      else if (data.cmd === 'prev') gotoPage(currentPage - 1);
      else if (data.cmd === 'goto') gotoPage(data.page);
    });

    if (fileUrl) {
      pdfjsLib.getDocument(fileUrl).promise
        .then(doc => { pdfDoc = doc; gotoPage(1); })
        .catch(() => { loading.textContent = '⚠ שגיאה בטעינת המסמך'; });
    }
  </script>
</body>
</html>
