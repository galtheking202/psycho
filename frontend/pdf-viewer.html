<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #525659;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 8px;
    }
    #loading {
      color: #ccc;
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 40px;
    }
    .pdf-page-canvas {
      display: block;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      background: #fff;
      width: 100%;
    }
    #nav-bar {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-family: sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
      z-index: 10;
    }
    #nav-bar.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="loading">טוען מסמך...</div>
  <div id="nav-bar"></div>

  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs';

    const params  = new URLSearchParams(location.search);
    const fileUrl = decodeURIComponent(params.get('file') || '');
    const loading = document.getElementById('loading');
    const navBar  = document.getElementById('nav-bar');

    let pdfDoc      = null;
    let currentPage = 1;
    let navTimer    = null;
    const canvases  = [];

    function showNav(text) {
      navBar.textContent = text;
      navBar.classList.add('show');
      clearTimeout(navTimer);
      navTimer = setTimeout(() => navBar.classList.remove('show'), 2000);
    }

    async function renderPage(pageNum) {
      const page     = await pdfDoc.getPage(pageNum);
      const vp0      = page.getViewport({ scale: 1 });
      const scale    = window.innerWidth / vp0.width;
      const viewport = page.getViewport({ scale });

      const canvas         = document.createElement('canvas');
      canvas.className     = 'pdf-page-canvas';
      canvas.dataset.page  = pageNum;
      canvas.width         = viewport.width;
      canvas.height        = viewport.height;

      document.body.insertBefore(canvas, navBar);
      canvases[pageNum - 1] = canvas;

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    async function loadAllPages() {
      const total = pdfDoc.numPages;
      loading.textContent = `טוען ${total} עמודים...`;
      for (let i = 1; i <= total; i++) {
        loading.textContent = `טוען עמוד ${i} / ${total}...`;
        await renderPage(i);
      }
      loading.style.display = 'none';
      window.parent.postMessage({ type: 'pdf-ready', total }, '*');
    }

    function gotoPage(n) {
      if (!pdfDoc) return;
      n = Math.max(1, Math.min(n, pdfDoc.numPages));
      currentPage = n;
      const canvas = canvases[n - 1];
      if (canvas) canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
      showNav(`עמוד ${n} / ${pdfDoc.numPages}`);
      window.parent.postMessage({ type: 'pdf-page', page: n, total: pdfDoc.numPages }, '*');
    }

    window.addEventListener('message', ({ data }) => {
      if (!data) return;
      if      (data.cmd === 'next') gotoPage(currentPage + 1);
      else if (data.cmd === 'prev') gotoPage(currentPage - 1);
      else if (data.cmd === 'goto') gotoPage(data.page);
    });

    if (fileUrl) {
      pdfjsLib.getDocument(fileUrl).promise
        .then(doc => { pdfDoc = doc; loadAllPages(); })
        .catch(() => { loading.textContent = '⚠ שגיאה בטעינת המסמך'; });
    }
  </script>
</body>
</html>
