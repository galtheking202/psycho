server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use a public resolver so nginx resolves the backend hostname dynamically
    # (required when proxy_pass uses a variable — prevents stale-DNS 502 on Railway)
    resolver 1.1.1.1 8.8.8.8 valid=15s ipv6=off;

    location /api/ {
        set $backend "BACKEND_URL_PLACEHOLDER";
        proxy_pass         $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
